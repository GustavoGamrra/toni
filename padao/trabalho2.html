    <script>
              function pfc(){
            let valor = document.getElementById("cpf").value;
            let regex = /^(\d{3}\.\d{3}\.\d{3}-\d{2}|\d{11})$/;

            if (regex.test(valor)) {
                alert("cpf valido");
            } else {
                alert("cpf invalido");
            }
        }
        function testa(){ 
            let ver = document.getElementById("bla").value;
            let testar = /^(?=.*[A-Z]).{8,}$/;

            if (testar.test(ver)){
                alert ("senha valida");
            } else {
                alert("senha invalida")
            }
        }  
        
        function emaio(){ 
            let emei = document.getElementById("emei").value;
            let emilho = /^[0-9A-Za-z]+@[A-Za-z]+.com$/;

            if (emilho.test(emei)){
                alert ("seu e-mail é valido");
            } else {
                alert("seu e-mail é invalido");
            }
        }      
         function nuuu(){ 
            let num = document.getElementById("nuu").value;
            let mun = /^[0-9]+$/;

            if (mun.test(num)){
                alert ("sequencia valida");
            } else {
                alert("sequencia invalida");
            }
        }      
    </script>
